machine:
  engine: "proxmox"
  memory: "2048"
  cpu: "2"
  # ISO source: local path, HTTP URL, or Proxmox storage reference
  # iso: "/home/user/build/your-os.iso"        # local file → auto-transferred to Proxmox
  # iso: "https://example.com/your-os.iso"      # URL → Proxmox downloads directly
  iso: "local:iso/your-os.iso"              # storage ref → used as-is (no transfer)
  driveSizes:
    - "30000"  # 30GB boot disk (in MB, converted to GB for Proxmox)
  ssh:
    host: "proxmox.example.com"    # Proxmox host IP (DNAT target)
    port: "2222"                   # DNAT forwarded port
    user: "root"
    pass: "testpassword"
  proxmox:
    apiURL: "https://proxmox.example.com:8006/api2/json"
    node: "pve"
    tokenID: "peg@pam!automation"
    tokenSecret: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    storage: "local-lvm"
    bridge: "vnet1"                # SDN VNet name
    zone: "nat"               # SDN zone name
    insecureTLS: true
    isoStorage: "local"              # storage for ISOs (default: "local")
clean: true

specs:
- describe: "Proxmox VM tests"
  assertions:
    "Basic connectivity":
      - preOps:
        - eventuallyConnects: 180
        command: |
          echo hello
        expect:
          containString: "hello"
    "System info":
      - command: |
          uname -a
        expect:
          containString: "Linux"
